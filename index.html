<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Le Système Solaire — Observatoire interactif</title>

<!-- Polices : Fraunces (titres, ambiance "atlas céleste"), Work Sans (texte), IBM Plex Mono (données) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ciel étoilé généré en JavaScript -->
  <div class="stars" id="stars" aria-hidden="true"></div>

  <header class="masthead">
    <p class="eyebrow">Observatoire</p>
    <h1>Le Système Solaire</h1>
  </header>

  <!-- Le Soleil, les orbites et les planètes sont générés par script.js -->
  <main class="stage" id="stage"></main>

  <!-- Sélection rapide : utile car les planètes bougent et sont parfois petites à toucher -->
  <section class="legend" id="legend" aria-label="Sélection rapide d'un astre"></section>

  <footer class="controls">
    <button id="playPause" class="control-btn" type="button" aria-label="Mettre en pause">
      <span id="playPauseIcon" aria-hidden="true">⏸</span>
    </button>
    <div class="speed-control">
      <label for="speed">Vitesse orbitale <span id="speedValue">1×</span></label>
      <input type="range" id="speed" min="0.25" max="3" step="0.25" value="1">
    </div>
  </footer>

  <div class="scrim" id="scrim"></div>

  <aside class="info-panel" id="infoPanel" aria-hidden="true">
    <button class="info-close" id="closeInfo" type="button" aria-label="Fermer la fiche">×</button>
    <p class="info-eyebrow" id="infoType"></p>
    <h2 class="info-name" id="infoName"></h2>
    <p class="info-desc" id="infoDesc"></p>
    <dl class="info-grid" id="infoGrid"></dl>
    <p class="info-fact" id="infoFact"></p>
  </aside>

  <script src="script.js"></script>
</body>
</html>
